services:
  production-keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: ${KEYCLOAK_CONTAINER_NAME:-production-keycloak}
    restart: unless-stopped
    command: start-dev
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8080}:8080"
      - "${KEYCLOAK_HTTPS_PORT:-8443}:8443"
    env_file:
      - .env.production
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-mykeycloakpassword}
      KC_DB: postgres
      KC_DB_URL_HOST: ${KEYCLOAK_DB_HOST:-host.docker.internal}
      KC_DB_URL_PORT: ${KEYCLOAK_DB_PORT:-5432}
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME:-postgres}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-postgres}
    volumes:
      - ${KEYCLOAK_MOUNT_PATH:-./data}:/opt/keycloak/data
    networks:
      - default
