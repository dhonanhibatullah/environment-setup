services:
  desktop:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DESKTOP_IMAGE:-desktop-kasm-ubuntu-noble:latest}
    container_name: ${DESKTOP_CONTAINER_NAME:-desktop}
    restart: unless-stopped
    shm_size: ${DESKTOP_SHM_SIZE:-8gb}
    ports:
      - "${DESKTOP_PORT:-6901}:6901"
      - "${DESKTOP_SSH_PORT:-2222}:22"
    env_file:
      - .env
    environment:
      VNC_PW: ${DESKTOP_VNC_PASSWORD:-password}
      DESKTOP_SSH_PUBLIC_KEYS: ${DESKTOP_SSH_PUBLIC_KEYS:-}
      NVIDIA_VISIBLE_DEVICES: ${DESKTOP_NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${DESKTOP_NVIDIA_DRIVER_CAPABILITIES:-all}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    volumes:
      - ${DESKTOP_USER_MOUNT_PATH:-./data/kasm_user}:/home/kasm-user
    networks:
      - default
