services:
  desktop:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DESKTOP_IMAGE:-desktop-kasm-ubuntu-noble:latest}
    container_name: ${DESKTOP_CONTAINER_NAME:-desktop}
    restart: unless-stopped
    shm_size: ${DESKTOP_SHM_SIZE:-8gb}
    ports:
      - "${DESKTOP_PORT:-6901}:6901"
    env_file:
      - .env
    environment:
      VNC_PW: ${DESKTOP_VNC_PASSWORD:-password}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-all}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    networks:
      - default
